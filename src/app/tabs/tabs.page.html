<!-- Main Ionic tabs container that listens for tab changes. -->
<ion-tabs (ionTabsDidChange)="onTabsDidChange($event)">

  <!-- Bottom tab bar with dynamic classes for the currently selected tab. -->
  <ion-tab-bar
    slot="bottom"
    [class.tab1-selected]="activeTab === 'tab1'"
    [class.tab2-selected]="activeTab === 'tab2'"
    [class.tab3-selected]="activeTab === 'tab3'"
    [class.tab4-selected]="activeTab === 'tab4'">

    <!-- Tab 1 opens the inventory list and search page. -->
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon aria-hidden="true" name="list-outline"></ion-icon>
      <ion-label>Inventory</ion-label>
    </ion-tab-button>

    <!-- Tab 2 opens the add item and featured items page. -->
    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon aria-hidden="true" name="add-circle-outline"></ion-icon>
      <ion-label>Add</ion-label>
    </ion-tab-button>

    <!-- Tab 3 opens the edit and delete management page. -->
    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon aria-hidden="true" name="create-outline"></ion-icon>
      <ion-label>Manage</ion-label>
    </ion-tab-button>

    <!-- Tab 4 opens the privacy and security information page. -->
    <ion-tab-button tab="tab4" href="/tabs/tab4">
      <ion-icon aria-hidden="true" name="shield-checkmark-outline"></ion-icon>
      <ion-label>Privacy</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
